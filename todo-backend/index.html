<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List App</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color:rgb(233, 238, 238);
        }
        header{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        h1{
            text-decoration: underline;
            color: rgb(46, 95, 231);
        }
        .addTask{
            width:80%;
            height: 40px;
            display: flex;
            justify-content: center;
            border: 2px solid white;
            margin-bottom: 40px;
        }
        .addTask input{
            width: 100%;
        }
        .addTask button{
            background-color: rgb(46, 95, 231);
            color: white;
            width: 100%;
            height: 100%;
        }
        .tasks{
            border-top: 2px solid rgb(94, 93, 93);
            padding-top: 10px;
            margin: 10px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        li{
            width: 100%;
            display: flex;
            flex-direction: row;
        }
        .detail{
            width: 80%;
        }
        .button{
            width: 20%;
        }
        button{
            background-color: rgb(46, 95, 231);
            color: white;
        }
        .edit{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 11, 11, 0.5);
            visibility: hidden;
        }
        #confirm{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(11, 11, 11, 0.5);
            visibility: hidden;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Todo's</h1>
        <div class="addTask">
            <input type="text" placeholder="Add new..." id="newTask">
           <div> <button type="button" id="addBtn" >Add</button></div>
        </div>
    </header>
    <main>
        <div class="tasks">
        </div>
        
        <div id="confirm" >
            <p>Are you sure?</p>
            <div>
                <button type="button" id="updBtn" onClick="confirmTask()">Yes</button>
                <button type="button" id="cancelBtn" onClick="cancelTask()">No</button>
            </div>
        </div>
        <div class="edit" >
            <input type="text" placeholder="Edit Task..." id="editTask">
            <div>
                <button type="button" id="updBtn" onClick="editTask()">Ok</button>
                <button type="button" id="cancelBtn" onClick="cancelUpdate()">Cancel</button>
            </div>
        </div>
        
    </main>
    <script>
       let taskid = null
            const addBtn = document.getElementById('addBtn')
        const tasksDiv = document.querySelector('.tasks')
        const api = 'http://localhost:3000/tasks'

        async function fetchTasks(){
            try {
                const response = await fetch(api)
                if(!response.ok) throw new Error('Network response was not ok')

                const tasks = await response.json()
                tasksDiv.innerHTML = ''
                // tasksDiv.replaceChildren();
                    tasks.forEach(task => {
                            const newTask = document.createElement('li')
                    newTask.innerHTML = `
                    <div class="detail">
                        <input type="checkbox" name="task"
                        <label for="task1">${task.task}</label>
                    </div>
                    <div class='button'>
                         <button type="button" onClick="update(${task.id})">EDIT</button>
                        <button type="button" onClick="removeTask(${task.id})">DELETE</button>
                    </div>
                    `

                    tasksDiv.appendChild(newTask)        
                });
                document.getElementById('newTask').value = ''; 
            }catch(e){
                console.log(e)
            }
        }

        addBtn.addEventListener('click', async()=>{
            // event.preventDefault();
            const task = document.getElementById('newTask').value 
            if(task == ""){
                return
            }
            try{
                const response = await fetch(api, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({task}),
                })

                if(!response.ok) throw new Error('Failed to add task')

                const newTask = await response.json()
                fetchTasks()
            }catch (e){
                console.log(e)
            }
        })

        function removeTask(id){
            taskid = id
            document.getElementById('confirm').style.visibility = 'visible';
        }


        // function editTask(id){
        //     document.querySelector('.edit').style.visibility = 'visible';
        // }
        function update(id){
            taskid = id
            document.querySelector('.edit').style.visibility = 'visible';
        }

        function cancelUpdate(){
            document.querySelector('.edit').style.visibility = 'hidden'
        }





        async function confirmTask() {
            try{
                const response = await fetch (`${api}/${taskid}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type' : 'application/json'
                    }
                })
                if(response.ok){
                    // console.log("deleted successfully", taskid)
                }else{
                    console.error(response.status)
                }
            }catch(e){
                    console.log(e)
                }
                fetchTasks()
                document.getElementById('confirm').style.visibility = 'hidden';           
        }
        function cancelTask(){
            document.getElementById('confirm').style.visibility = 'hidden';
        }




        async function editTask(){
            const updTask = document.getElementById('editTask').value 
            if(updTask == ""){
                 document.querySelector('.edit').style.visibility = 'hidden'
                return
            }
            try{
                const response= await fetch(`${api}/${taskid}`,{
                method: 'PUT',
                headers: {
                    'Content-Type' : 'application/json',
                },
                body: JSON.stringify({task: updTask})
            })
            if(response.ok){
                const updatedData = await response.json();
            }else {
                console.error(response.status);
            }
        }
            catch(err){
                console.log(err)
            }

         document.querySelector('.edit').style.visibility = 'hidden'
            fetchTasks();
        }

        fetchTasks();
        
    </script>
</body>
</html>
