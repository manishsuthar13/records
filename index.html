<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List App</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background-color:rgb(233, 238, 238);
        }
        header{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        h1{
            text-decoration: underline;
            color: rgb(46, 95, 231);
        }
        .addTask{
            width:80%;
            height: 40px;
            display: flex;
            justify-content: center;
            border: 2px solid white;
            margin-bottom: 40px;
        }
        .addTask input{
            width: 100%;
        }
        .addTask button{
            background-color: rgb(46, 95, 231);
            color: white;
            width: 100%;
            height: 100%;
        }
        .tasks{
            border-top: 2px solid rgb(94, 93, 93);
            padding-top: 10px;
            margin: 10px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        li{
            width: 100%;
            display: flex;
            flex-direction: row;
        }
        .detail{
            width: 80%;
        }
        .button{
            width: 20%;
        }
        button{
            background-color: rgb(46, 95, 231);
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Todo's</h1>
        <div class="addTask">
            <input type="text" placeholder="Add new..." id="newTask">
           <div> <button type="button" id="addBtn" onClick="addTask()">Add</button></div>
        </div>
    </header>
    <main>
        <div class="tasks">
            <li id="task0">
                <div class="detail">
                    <input type="checkbox" name="task1">
                    <label for="task1">Buy groceries for next week</label>
                </div>
                <div class="button">
                    <button type="button" onClick="removeTask()">DELETE</button>
                </div>
            </li>
        </div>

    </main>
    <script>
        let count = 0;
        function addTask(){
            count++;
            let newTask = document.getElementById('newTask').value
            let newhtml = `<li id="task${count}">
                <div class="detail">
                    <input type="checkbox" name="task1">
                    <label for="task1">${newTask}</label>
                </div>
                <div class="button">
                    <button type="button" onClick="removeTask()">DELETE</button>
                </div>
            </li>`
            document.querySelector('.tasks').insertAdjacentHTML('beforeend',newhtml )
        }

        function removeTask(){
            const taskToRemove = document.getElementById(`task${count}`);
            taskToRemove.remove();
            count--;
        }
    </script>
</body>
</html>
